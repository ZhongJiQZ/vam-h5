  <script type="text/javascript">
    /** PC 站检测到移动端 UA 时，跳到与当前域名同根的 H5 子域（首段子域替换为 h5），如 dex.veloxam.org → h5.veloxam.org */
    function getMobileH5RedirectBase() {
      var loc = window.location;
      var protocol = loc.protocol;
      var port = loc.port;
      var hostname = loc.hostname || "";
      var fallback = "https://h5.zonweb.vip/";
      if (!hostname) {
        return fallback;
      }
      // IPv4 / IPv6：无法可靠推导子域，使用历史兜底
      if (/^(\d{1,3}\.){3}\d{1,3}$/.test(hostname) || hostname.indexOf(":") !== -1) {
        return fallback;
      }
      var parts = hostname.split(".");
      if (parts.length >= 3) {
        if (parts[0] === "h5") {
          return null;
        }
        parts[0] = "h5";
        hostname = parts.join(".");
      } else if (parts.length === 2) {
        hostname = "h5." + hostname;
      } else {
        return fallback;
      }
      var hostWithPort = hostname + (port ? ":" + port : "");
      return protocol + "//" + hostWithPort + "/";
    }
    var mobileAgent = new Array(
      "iphone",
      "ipod",
      "ipad",
      "android",
      "mobile",
      "blackberry",
      "webos",
      "incognito",
      "webmate",
      "bada",
      "nokia",
      "lg",
      "ucweb",
      "skyfire"
    );
    var browser = navigator.userAgent.toLowerCase();
    var isMobile = false;
    for (var i = 0; i < mobileAgent.length; i++) {
      if (browser.indexOf(mobileAgent[i]) != -1) {
        isMobile = true;
        var hash = window.location.hash || "";
        var base = getMobileH5RedirectBase();
        if (base) {
          location.href = base + hash;
        }
        break;
      }
    }
